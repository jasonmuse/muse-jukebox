<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Muse Jukebox</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/gif" href="images/penguin.gif" />
    <link rel="icon" type="image/png" href="images/peng.png" />
</head>
<body>
  <div id="where-background" aria-hidden="true"></div>
  <div id="jukebox-wrapper">
  <div id="jukebox-container">
        <!-- Record Image -->
        <img src="images/record.png" class="record" alt="Record">
        <div id="record-seek-controls" class="record-seek-controls" aria-hidden="true">
            <button id="record-rewind" class="record-seek-button record-seek-button--rewind" type="button" aria-label="Rewind 10 seconds">
                <span class="seek-arrow" aria-hidden="true">&#8634;</span>
                <span class="seek-seconds" aria-hidden="true">10s</span>
            </button>
            <button id="record-forward" class="record-seek-button record-seek-button--forward" type="button" aria-label="Forward 10 seconds">
                <span class="seek-seconds" aria-hidden="true">10s</span>
                <span class="seek-arrow" aria-hidden="true">&#8635;</span>
            </button>
        </div>
    <div id="jukebox">

        <h1 class="jukebox-title">
            <div class="title-container">
                <span class="penguin-badge">
                    <img class="penguin-icon" src="images/penguin.gif" alt="Penguin Icon">
                </span>
                <span class="title-text-main">Muse Jukebox</span>
                <span class="penguin-badge">
                    <img class="penguin-icon" src="images/penguin.gif" alt="Penguin Icon">
                </span>
            </div>
        </h1>

        <p class="jukebox-description">
            <span class="sign-bolt sign-bolt--tl" aria-hidden="true"></span>
            <span class="sign-bolt sign-bolt--tr" aria-hidden="true"></span>
            <span class="sign-bolt sign-bolt--bl" aria-hidden="true"></span>
            <span class="sign-bolt sign-bolt--br" aria-hidden="true"></span>
            <span class="jukebox-description-text">Welcome to the semi-complete library of my <i>Muse Tunes</i> - gathered right in one place. Feel free to scroll through or filter the song list by genre, vibe, or whatever tag you feel like. 🌊</span>
        </p>
        <!--
        itchyscratchy image
        <img src="images/itchyscratchy.gif" alt="Itchy and Scratchy" style="position: absolute; top: 150px; left:40%; z-index: 0; opacity: 0.5;">
        -->


        <!-- Filter Section -->
        <div id="filters">
            <button id="random-track-button" class="random-track-button" type="button" aria-label="Play a random song" title="Play a random song">&#127922;</button>
            <div class="filter-group">
                <label for="sort-filter">Sort by:</label>
                <select id="sort-filter">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="title-asc">Title (A-Z)</option>
                    <option value="title-desc">Title (Z-A)</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="tag-filter">Filter by tag:</label>
                <select id="tag-filter">
                    <option value="all">All</option>
                </select>
            </div>
        </div>

        <!-- Track List -->
        <div id="track-list"></div>

        <!-- Cover Art Modal -->
        <div id="cover-modal" class="cover-modal">
            <div class="cover-modal-overlay"></div>
            <div class="cover-modal-content">
                <button class="cover-modal-close">&times;</button>
                <img id="cover-modal-image" src="" alt="Album Cover">
            </div>
        </div>

        <!-- additional GIF -->
        <a class="frogquest-link" href="https://amused.itch.io/frog-quest" target="_blank">

        <img class="frogquest-gif" src="images/frogblinkie.gif" alt="Animated Frog">
        </a>
    </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
